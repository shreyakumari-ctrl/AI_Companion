name: Backend CI

on:
  push:
    branches: [main, dev]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
      - "package.json"
      - "package-lock.json"
  pull_request:
    branches: [main, dev]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
      - "package.json"
      - "package-lock.json"

jobs:
  verify-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Apply local SQL migrations
        run: npm run db:migrate

      - name: Build backend
        run: npm run build --workspace backend

      - name: Verify backend contract
        run: npm run verify:backend
